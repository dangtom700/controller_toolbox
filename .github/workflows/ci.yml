name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

    steps:
      - uses: actions/checkout@v4

      # ── Eigen (Linux) ───────────────────────────────────────────────────────
      - name: Install Eigen (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends libeigen3-dev ninja-build

      # ── Eigen (Windows) — vcpkg is pre-installed on windows-latest ─────────
      - name: Install Eigen (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install eigen3:x64-windows
        shell: pwsh

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -B build -G Ninja
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release

      # --output-on-failure prints the full test log when a test fails,
      # instead of just "X tests failed" with no details.
      - name: Test
        working-directory: build
        run: ctest --build-config Release --output-on-failure
